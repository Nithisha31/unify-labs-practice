<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calm Blog Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🌿 Calm Blog Space</h1>
    <button id="toggleTheme">🌙</button>
  </header>

  <main>
    <!-- Post Editor -->
    <section class="editor">
      <h2>Create New Post</h2>
      <input type="text" id="title" placeholder="Enter Title" required>
      <input type="text" id="category" placeholder="Enter Category" required>
      <textarea id="content" placeholder="Write your content..." required></textarea>
      <div class="actions">
        <button id="publishBtn">Publish Post</button>
        <button id="draftBtn">Save as Draft</button>
      </div>
    </section>

    <!-- Published Posts -->
    <section>
      <h2>Published Posts</h2>
      <div id="published-posts" class="grid"></div>
    </section>

    <!-- Drafts -->
    <section>
      <h2>Drafts</h2>
      <div id="draft-posts" class="grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
